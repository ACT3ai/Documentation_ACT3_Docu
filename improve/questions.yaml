      tags: [Blender sync, connection error, integration, troubleshooting]
    answer:
      description: >
        Check that the ACT3 AI Blender add-on is enabled in Blender Preferences
        and that your API key is entered correctly. Ensure ACT3 AI is open in
        your browser and you are signed in. The add-on requires an active
        internet connection. If the issue persists, try regenerating your API
