      tags: [cinematic, quality, realistic, grain, look]
    answer:
      description: >
        Use Veo 3 at High quality, add film grain and subtle vignette in your
        Style Preset, specify real film stock references in prompts (e.g., "shot
        on Kodak Vision3 500T"), include naturalistic camera movement (slight
        handheld drift), and avoid overly literal or clean prompts. Review the
        Cinematography guides for lens and lighting choices that add depth.
      doc_file: docs/features/ai-video-generation.mdx
      doc_updated: true
      click_path:
