      doc_file: docs/features/sets.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - Sets

  - question: What is the top-down view and when do I use it?
    question_info:
      category: Sets
      tags: [top-down view, overhead, blocking, set layout]
    answer:
      description: >
        The top-down view shows your set from above, letting you plan character
        blocking and camera placement before generating any video. Place
        characters, mark camera positions, and visualize sightlines. This is
        especially useful for action sequences or multi-character scenes.
      doc_file: docs/features/sets.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - Sets

