      description: >
        Visual inconsistency usually comes from inconsistent shot prompts,
        different models per shot, or no Style Preset applied. Apply a single
        Style Preset to your whole project, use the same AI model for all
        shots in a scene, and ensure your shot prompts all include the same
        lighting and mood language defined in your style guide.
