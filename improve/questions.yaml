  - question: What is the best plan for a solo indie filmmaker just getting started?
    question_info:
      category: Account & Billing
      tags: [indie filmmaker, solo, plan recommendation, standard]
    answer:
      description: >
        Start on the Free tier to explore the platform. When you're ready to
        make your first real project, upgrade to Standard ($35/month). Standard
        gives you 33,000 credits, access to Veo 3 and Runway, 3 concurrent
        jobs, and a high credit rollover cap — enough to produce a short film
        or several scenes per month without worrying about running out.
      doc_file: docs/account/billing.mdx
