  - question: Does ACT3 AI support Final Draft format?
    question_info:
      category: Script Editing
      tags: [Final Draft, fdx, import, export]
    answer:
      description: >
        Yes. ACT3 AI can import .fdx files from Final Draft and export back to
        .fdx. The parser handles standard screenplay elements including scene
        headings, transitions, parentheticals, and dual dialogue.
      doc_file: docs/features/script-editing.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - Script Editing

  # -----------------------------------------------------------------------
  # AI VIDEO GENERATION
  # -----------------------------------------------------------------------

  - question: How do I generate a video shot in ACT3 AI?
    question_info:
      category: AI Video Generation
      tags: [generate, shot, video, AI]
    answer:
      description: >
        Open a shot in your scene, set the camera angle, characters, lighting,
        and write a shot prompt describing the action. Click Generate. ACT3 AI
        sends the request to your selected AI video model (Veo 3, Runway, etc.)
        and returns a clip when ready.
      doc_file: docs/features/ai-video-generation.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - AI Video Generation

  - question: Which AI video model should I use for my film?
    question_info:
      category: AI Video Generation
      tags: [Veo 3, Runway, Hunyuan, model selection]
    answer:
      description: >
        Google Veo 3 delivers the highest cinematic quality and is the default
        for film projects. Runway Gen-3 excels at stylized or motion-heavy
        shots. Hunyuan and Wan 2.1 offer fast, lower-cost generation good for
        previsualization. You can mix models across shots within the same
        project.
      doc_file: docs/features/ai-video-generation.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - AI Video Generation

  - question: Why did my video generation fail?
    question_info:
      category: AI Video Generation
      tags: [error, failed, generation, troubleshooting]
    answer:
      description: >
        Common causes: the shot prompt contains policy-violating content, the
        selected model is temporarily unavailable, or you ran out of credits.
        Check the error message on the failed shot. You can edit the prompt and
        regenerate without losing your shot settings.
      doc_file: docs/features/ai-video-generation.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - AI Video Generation

  - question: Can I regenerate a shot I don't like?
    question_info:
      category: AI Video Generation
      tags: [regenerate, retry, shot]
    answer:
      description: >
        Yes. Click the regenerate icon on any shot. You can adjust the shot
        prompt, camera settings, or model before regenerating. Previous
        versions are kept in the shot's version history so you can compare
        and revert.
      doc_file: docs/features/ai-video-generation.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - AI Video Generation

  - question: How do I keep characters consistent across multiple generated shots?
    question_info:
      category: AI Video Generation
      tags: [character consistency, actors, generation]
    answer:
      description: >
        Assign digital actors to each shot from your Actor Library. ACT3 AI
        passes the same character reference into every generation request,
        maintaining appearance, wardrobe, and likeness across all shots that
        use that actor.
      doc_file: docs/features/actors.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - Actors

  - question: How long does video generation take?
    question_info:
      category: AI Video Generation
      tags: [generation time, render time, speed]
    answer:
      description: >
        Generation time depends on the model, resolution, and clip length.
        Veo 3 typically takes 1–4 minutes per shot at standard resolution.
        Runway and Hunyuan can be faster. You can queue many shots at once and
        continue working while they generate.
      doc_file: docs/features/render-queue.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - Render Queue

  - question: What resolution can I generate at?
    question_info:
      category: AI Video Generation
      tags: [resolution, 4K, 1080p, quality]
    answer:
      description: >
        Available resolutions depend on the selected model. Veo 3 supports up
        to 1080p; 4K upscaling is available as a post-process step. Runway and
        Hunyuan generate at 720p or 1080p. You set the target resolution per
        shot or globally for the project.
      doc_file: docs/features/ai-video-generation.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - AI Video Generation

  - question: How do I write a good shot prompt?
    question_info:
      category: AI Video Generation
      tags: [shot prompt, prompt writing, generation quality]
    answer:
      description: >
        Describe the action, mood, and visual style in plain English. Include
        character actions, camera movement, and environmental details. Be
        specific about what should be happening in the frame. Avoid vague
        language. Example: "Marcus walks slowly through the foggy alley,
        looking over his shoulder, rain hitting the cobblestones."
      doc_file: docs/concepts/shots.mdx
      doc_updated: true
      click_path:
        - Home
        - Core Concepts
        - Shots

  - question: Can I generate slow motion?
    question_info:
      category: AI Video Generation
      tags: [slow motion, frame rate, cinematic]
    answer:
      description: >
        Yes. Set the frame rate override on a shot to high-frame-rate and
        include slow motion language in your shot prompt (e.g., "slow-motion
        close-up"). The video editor can also apply time remapping to any
        generated clip to create slow motion in post.
      doc_file: docs/features/ai-video-generation.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - AI Video Generation

  - question: How do I generate a scene with two characters interacting?
    question_info:
      category: AI Video Generation
      tags: [multi-character, interaction, generation]
    answer:
      description: >
        Assign both digital actors to the shot in the cast panel. In your shot
        prompt, describe the interaction between them (e.g., "Sarah and David
        argue across the kitchen table, Sarah pointing at him"). ACT3 AI passes
        both actor references to the model to maintain both appearances.
      doc_file: docs/features/actors.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - Actors

