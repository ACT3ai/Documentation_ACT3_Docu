  # -----------------------------------------------------------------------

  - question: Can I collaborate with a co-writer or co-director on my project?
    question_info:
      category: Collaboration
      tags: [collaboration, team, co-director, sharing]
    answer:
      description: >
        Yes. From the Project menu, click Share and invite collaborators by
        email. Assign them Editor or Viewer roles. Editors can modify scenes,
        shots, and generate video. Viewers can comment and review but not
        change anything.
      doc_file: docs/features/collaboration.mdx
      click_path:
        - Home
        - "> Features"
        - "[> Collaboration]"

  # -----------------------------------------------------------------------
  # INTEGRATIONS — VEO 3
  # -----------------------------------------------------------------------

  - question: How do I use Google Veo 3 for video generation?
    question_info:
      category: Integrations
      tags: [Veo 3, Google, video generation, integration]
    answer:
      description: >
        Veo 3 is the default model for new projects. In the project settings,
        confirm Veo 3 is selected under AI Video Model. When you click Generate
        on a shot, ACT3 AI sends the request to Veo 3 and returns the clip.
        No separate API key is needed — it runs through your ACT3 AI credits.
      doc_file: docs/integrations/veo3.mdx
      click_path:
        - Home
        - "> Integrations"
        - "[> Google Veo 3]"

  - question: What makes Veo 3 different from other video models?
    question_info:
      category: Integrations
      tags: [Veo 3, model comparison, quality]
    answer:
      description: >
        Veo 3 produces the most photorealistic and cinematically accurate video
        of the available models. It handles complex scene geometry, lighting
        consistency, and character motion especially well. It costs more credits
        per shot than Runway or Hunyuan but delivers higher final-film quality.
      doc_file: docs/integrations/veo3.mdx
      click_path:
        - Home
        - "> Integrations"
        - "[> Google Veo 3]"

  # -----------------------------------------------------------------------
  # INTEGRATIONS — RUNWAY
  # -----------------------------------------------------------------------

  - question: When should I use Runway instead of Veo 3?
    question_info:
      category: Integrations
      tags: [Runway, model selection, stylized, motion]
    answer:
      description: >
        Use Runway Gen-3 for shots that need strong motion, exaggerated
        movement, or stylized aesthetics (anime, painterly, surrealist). Runway
        is also faster and costs fewer credits, making it good for
        previsualization passes before doing a final Veo 3 render.
      doc_file: docs/integrations/runway.mdx
      click_path:
        - Home
        - "> Integrations"
        - "[> Runway]"

  # -----------------------------------------------------------------------
  # INTEGRATIONS — BLENDER
  # -----------------------------------------------------------------------

  - question: How do I connect ACT3 AI to Blender?
    question_info:
      category: Integrations
      tags: [Blender, integration, 3D, sets, sync]
    answer:
      description: >
        Install the ACT3 AI Blender add-on from the Integrations page. In
        Blender, go to Edit → Preferences → Add-ons and enable it. Enter your
        ACT3 AI API key to link the two apps. You can then push scene data,
        camera rigs, and character animations directly to your ACT3 AI project.
      doc_file: docs/integrations/blender.mdx
      click_path:
        - Home
        - "> Integrations"
        - "[> Blender]"

  - question: Can I import a Blender scene as a set in ACT3 AI?
    question_info:
      category: Integrations
      tags: [Blender, import, set, 3D scene]
    answer:
      description: >
        Yes. After linking Blender via the add-on, click Push Scene in the
        Blender sidebar panel. Your scene geometry, materials, lights, and
        camera positions sync to ACT3 AI as a set reference for the selected
        scene or shot.
      doc_file: docs/integrations/blender.mdx
      click_path:
        - Home
        - "> Integrations"
        - "[> Blender]"

  # -----------------------------------------------------------------------
  # INTEGRATIONS — COMFYUI / FLUX / SDXL
  # -----------------------------------------------------------------------

  - question: How does ComfyUI work inside ACT3 AI?
    question_info:
      category: Integrations
      tags: [ComfyUI, nodes, image generation, custom workflow]
    answer:
      description: >
        ACT3 AI can connect to a local ComfyUI instance to run custom node
        workflows for image generation, character design, or set concept art.
        Set the ComfyUI endpoint URL in Integrations settings, then trigger
        workflows directly from the Shot or Actor editor.
      doc_file: docs/integrations/comfyui.mdx
      click_path:
        - Home
        - "> Integrations"
        - "[> ComfyUI]"

  - question: What is FLUX and how do I use it for images?
    question_info:
      category: Integrations
      tags: [FLUX, image generation, concept art, storyboard]
    answer:
      description: >
        FLUX is a high-quality image generation model used in ACT3 AI for
        storyboard panels, actor concept art, and set design images. Select
        FLUX as the image model in the Storyboard or Actor generator and it
        produces photorealistic or stylized reference imagery.
      doc_file: docs/integrations/flux.mdx
      click_path:
        - Home
        - "> Integrations"
        - "[> FLUX]"

  # -----------------------------------------------------------------------
  # EXPORT
  # -----------------------------------------------------------------------

  - question: How do I export my finished movie?
    question_info:
      category: Export
      tags: [export, final output, render, movie]
    answer:
      description: >
        Go to the Project menu and click Export Movie. Choose your output
        format, resolution, and frame rate. ACT3 AI renders all shots in order,
        combines them with audio, applies your color grade, and packages the
        final video file for download.
      doc_file: docs/export/overview.mdx
      click_path:
        - Home
        - "> Export"
        - "[> Export Overview]"

  - question: What video formats can I export to?
    question_info:
      category: Export
      tags: [formats, MP4, ProRes, export]
    answer:
      description: >
        ACT3 AI exports to MP4 (H.264/H.265) for web and social media, ProRes
        (422, 4444) for professional post-production, and DCP package for
        festival/cinema delivery. Choose the format in the Export dialog.
      doc_file: docs/export/overview.mdx
      click_path:
        - Home
        - "> Export"
        - "[> Export Overview]"

  - question: How do I export for YouTube?
    question_info:
      category: Export
      tags: [YouTube, export, social media, horizontal]
    answer:
      description: >
        In the Export dialog, select the YouTube preset. This outputs MP4
        H.264 at 1920×1080 or 3840×2160 (4K), 16:9 aspect ratio, at your
        project's frame rate with AAC audio. It applies recommended bitrate
        settings for YouTube's compression pipeline.
      doc_file: docs/export/overview.mdx
      click_path:
        - Home
        - "> Export"
        - "[> Export Overview]"

  - question: How do I export for TikTok or vertical video (9:16)?
    question_info:
      category: Export
      tags: [TikTok, vertical, 9:16, social media, Reels]
    answer:
      description: >
        In the Export dialog, select the TikTok / Reels preset. This crops or
        reframes your shots to 9:16 at 1080×1920 and outputs an MP4 optimized
        for short-form vertical platforms. You can adjust the reframe position
        per shot before exporting.
      doc_file: docs/export/overview.mdx
      click_path:
        - Home
        - "> Export"
        - "[> Export Overview]"

  - question: How do I export for film festivals?
    question_info:
      category: Export
      tags: [festival, DCP, ProRes, professional]
    answer:
      description: >
        Select the Festival / DCP preset. ACT3 AI renders a ProRes 4444 master
        and optionally packages a DCP (Digital Cinema Package) with the correct
        color space (P3-DCI), audio format (48kHz/24-bit), and subtitle track.
        Check your specific festival's technical requirements before submitting.
      doc_file: docs/export/overview.mdx
      click_path:
        - Home
        - "> Export"
        - "[> Export Overview]"

  - question: What file formats are supported for export?
    question_info:
      category: Export
      tags: [file formats, formats, export options]
    answer:
      description: >
        Supported export formats include MP4 (H.264, H.265), ProRes 422 and
        4444, WebM (VP9), and DCP. Audio exports as AAC (for web), PCM WAV,
        or Dolby Digital. The export dialog shows which formats are available
        on your plan.
      doc_file: docs/export/overview.mdx
      click_path:
        - Home
        - "> Export"
        - "[> Export Overview]"

  # -----------------------------------------------------------------------
  # ACCOUNT & BILLING
  # -----------------------------------------------------------------------

  - question: How many credits does it cost to generate one shot?
    question_info:
      category: Account & Billing
      tags: [credits, cost, generation, pricing]
    answer:
      description: >
        Credit cost depends on the model and resolution. Veo 3 at 1080p costs
        approximately 10–20 credits per shot (5 seconds). Runway costs 4–8
        credits. Hunyuan and Wan cost 2–5 credits. TTS generation, lip sync,
        and storyboard panels cost 1–2 credits each. See the Credits page for
        the full table.
      doc_file: docs/account/credits.mdx
      click_path:
        - Home
        - "> Account & Billing"
        - "[> Credits]"

  - question: Do credits expire?
    question_info:
      category: Account & Billing
      tags: [credits, expiry, rollover]
    answer:
      description: >
        Credits purchased as part of a monthly subscription do not roll over
        to the next billing period. Credits purchased as one-time top-ups
        (credit packs) do not expire and carry forward indefinitely. Your
        dashboard shows which credits are subscription credits vs. purchased
        credits.
      doc_file: docs/account/credits.mdx
      click_path:
        - Home
        - "> Account & Billing"
        - "[> Credits]"

  - question: What is included in the free tier vs. paid plans?
    question_info:
      category: Account & Billing
      tags: [pricing, free tier, plans, subscription]
    answer:
      description: >
        The free tier includes a small credit allowance for exploration, access
        to Hunyuan and Wan models, and limited project storage. Paid plans add
        higher monthly credits, access to Veo 3 and Runway, 4K export, team
        seats, and priority render queue. See the Billing page for current plan
        details.
      doc_file: docs/account/billing.mdx
      click_path:
        - Home
        - "> Account & Billing"
        - "[> Billing & Plans]"

  - question: How do I buy more credits?
    question_info:
      category: Account & Billing
      tags: [buy credits, top up, purchase]
    answer:
      description: >
        Go to Account → Credits and click Buy Credits. Choose a credit pack
        size (100, 500, 1000, or 5000 credits). Credits are added to your
        account immediately after purchase and do not expire.
      doc_file: docs/account/credits.mdx
      click_path:
        - Home
        - "> Account & Billing"
        - "[> Credits]"

  - question: Can I share credits with my team?
    question_info:
      category: Account & Billing
      tags: [team credits, shared pool, organization]
    answer:
      description: >
        Yes. Organization accounts have a shared credit pool. All members draw
        from the same pool when generating. Admins can set per-member credit
        limits to prevent any single user from consuming the whole balance.
      doc_file: docs/account/credits.mdx
      click_path:
        - Home
        - "> Account & Billing"
        - "[> Credits]"

  - question: How do I invite a team member to my organization?
    question_info:
      category: Teams
      tags: [invite, team, organization, collaboration]
    answer:
      description: >
        Go to Account → Organization → Members and click Invite Member. Enter
        their email address and select a role (Admin, Editor, or Viewer). They
        receive an email invitation and join your organization when they accept.
      doc_file: docs/account/teams.mdx
      click_path:
        - Home
        - "> Account & Billing"
        - "[> Teams & Organization]"

  - question: How do I cancel my ACT3 AI subscription?
    question_info:
      category: Account & Billing
      tags: [cancel, subscription, billing]
    answer:
      description: >
        Go to Account → Billing and click Cancel Subscription. Your plan stays
        active until the end of the current billing period. After cancellation,
        your account downgrades to the free tier. Projects and generated videos
        are retained for 90 days.
      doc_file: docs/account/account-cancellation.mdx
      click_path:
        - Home
        - "> Account & Billing"
        - "[> Account Cancellation]"

  - question: How do I enable two-factor authentication?
    question_info:
      category: Account & Billing
      tags: [2FA, security, account settings]
    answer:
      description: >
        Go to Account → Settings → Security and click Enable Two-Factor
        Authentication. Scan the QR code with an authenticator app (Google
        Authenticator, Authy) and enter the verification code to confirm.
        2FA applies on every new device login.
      doc_file: docs/account/account-settings.mdx
      click_path:
        - Home
        - "> Account & Billing"
        - "[> Account Settings]"

