  - question: I am a VFX artist. How does ACT3 AI fit into my existing Blender pipeline?
    question_info:
      category: Integrations
      tags: [VFX, Blender, pipeline, 3D, specialist]
    answer:
      description: >
        ACT3 AI acts as the production management layer above Blender. Build
        and refine your 3D sets and character rigs in Blender, then sync them
        to ACT3 AI via the add-on for shot-level AI generation. ACT3 AI handles
        the narrative structure, shot sequencing, and final film assembly while
        you focus on the 3D assets and VFX work in Blender.
      doc_file: docs/integrations/blender.mdx
      doc_updated: true
      click_path:
        - Home
        - Integrations
        - Blender

  - question: Can I render Blender scenes server-side using ACT3 AI's cloud?
    question_info:
      category: Integrations
      tags: [cloud render, Blender, GPU, server-side rendering]
    answer:
      description: >
        ACT3 AI uses dedicated GPU nodes for its own AI generation pipeline.
        Direct Blender CPU/GPU renders are not run on ACT3 AI's cloud —
        Blender renders happen on your local machine and the output is synced
        to ACT3 AI. For heavy Blender renders, use your own local GPU or a
        dedicated cloud rendering service such as Sheepit or Render.st.
      doc_file: docs/integrations/blender.mdx
      doc_updated: true
      click_path:
        - Home
        - Integrations
        - Blender

