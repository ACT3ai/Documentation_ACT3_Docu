  # -----------------------------------------------------------------------
  # TROUBLESHOOTING & FAQ
  # -----------------------------------------------------------------------

  - question: Why does my generated video not match my shot prompt?
    question_info:
      category: Troubleshooting
      tags: [generation quality, prompt, mismatch]
    answer:
      description: >
        The most common causes are an ambiguous or short prompt, conflicting
        instructions (e.g., "bright daylight" with a night lighting preset),
        or a model that struggles with a specific scene type. Improve your
        shot prompt with more specific action and visual details, ensure your
        lighting preset matches the prompt, and try regenerating.
      doc_file: docs/faq/general.mdx
      click_path:
        - Home
        - "> FAQ"
        - "[> General FAQ]"

  - question: Why can't I see some features in my account?
    question_info:
      category: Troubleshooting
      tags: [missing features, plan, upgrade]
    answer:
      description: >
        Some features (Veo 3, 4K export, team seats, priority render) require
        a paid plan. If a feature appears locked or unavailable, check your
        current plan under Account → Billing. Upgrade to unlock features, or
        consult the FAQ for plan comparison.
      doc_file: docs/faq/general.mdx
      click_path:
        - Home
        - "> FAQ"
        - "[> General FAQ]"

  - question: Can I use ACT3 AI on Windows and Mac?
    question_info:
      category: Troubleshooting
      tags: [platform, browser, Mac, Windows, web app]
    answer:
      description: >
        ACT3 AI is a web application and runs in any modern browser on Mac,
        Windows, and Linux. No local installation is required. The optional
        Hero Blender Sync desktop app runs on Mac and Windows for Blender
        integration.
      doc_file: docs/getting-started/introduction.mdx
      click_path:
        - Home
        - "> Getting Started"
        - "[> Introduction]"

  - question: Does ACT3 AI work with Adobe Premiere Pro or DaVinci Resolve?
    question_info:
      category: Integrations
      tags: [Premiere Pro, DaVinci Resolve, post-production, NLE]
    answer:
      description: >
        ACT3 AI exports ProRes and MP4 files that are fully compatible with
        Premiere Pro, DaVinci Resolve, Final Cut Pro, and other NLEs. Export
        an XML or EDL from the timeline to import your edit directly into an
        external editor with cut points and clip references intact.
      doc_file: docs/export/overview.mdx
      click_path:
        - Home
        - "> Export"
        - "[> Export Overview]"
