        - Story Structure Overview

  - question: What is the three-act structure and how do I apply it in ACT3 AI?
    question_info:
      category: Core Concepts
      tags: [three act, structure, screenplay, acts]
    answer:
      description: >
        The three-act structure divides a story into Setup (Act 1), Confrontation
        (Act 2), and Resolution (Act 3). In ACT3 AI, create three Act containers
        in your project. Act 1 establishes characters and the inciting incident.
        Act 2 develops the conflict. Act 3 resolves it. The Story Arc editor
        helps you balance scene count and duration across all three acts.
      doc_file: docs/concepts/acts.mdx
      doc_updated: true
      click_path:
        - Home
        - Core Concepts
        - Acts

