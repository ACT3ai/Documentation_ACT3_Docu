  - question: How do I ensure my film has good pacing between fast and slow scenes?
    question_info:
      category: Core Concepts
      tags: [pacing, editing, story arc, fast slow, rhythm]
    answer:
      description: >
        Use the Story Arc editor to visualize your tension curve. Plot the
        emotional intensity of each scene. Alternate high-intensity action
        scenes with lower-tension dialogue or character moments. The timeline
        shows shot durations visually so you can see where the film breathes
        and where it needs tightening.
      doc_file: docs/concepts/overview.mdx
      doc_updated: true
      click_path:
