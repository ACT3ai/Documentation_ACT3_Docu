        manages an entire film: it structures your story into acts, scenes,
        shots, and beats; maintains character and set consistency across
        hundreds of shots; assembles and edits the final cut; and handles
        export for any platform. It uses Runway and Veo 3 as generation
        engines but provides the full directorial layer on top.
