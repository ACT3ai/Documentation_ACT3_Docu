  # -----------------------------------------------------------------------
  # ADVANCED GENERATION (NEW)
  # -----------------------------------------------------------------------

  - question: How do I control the duration of a generated shot?
    question_info:
      category: AI Video Generation
      tags: [duration, shot length, seconds, clip length]
    answer:
      description: >
        In the Shot editor, set the Target Duration field (in seconds). Most
        models support clips from 3 to 30 seconds. Match the duration to your
        narrative beat — fast-paced action shots may be 3–5 seconds; emotional
        dialogue shots may be 8–15 seconds. The credit cost scales with
        duration.
      doc_file: docs/features/ai-video-generation.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - AI Video Generation

  - question: How do I generate an establishing shot for my scene?
    question_info:
      category: Cinematography
      tags: [establishing shot, wide shot, location, scene intro]
    answer:
      description: >
        Select Extreme Wide or Wide as the shot type and frame the key landmark
        or setting of your scene. In the shot prompt, describe the full
        environment and time of day (e.g., "wide establishing shot of a
        rain-soaked Tokyo street at night, neon signs reflecting in puddles").
        Establishing shots are typically the first shot in a new scene.
      doc_file: docs/features/cinematography.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - Cinematography

  - question: How do I create an insert shot showing a detail?
    question_info:
      category: Cinematography
      tags: [insert shot, detail, close-up, object]
    answer:
      description: >
        Select Insert as the shot type. Insert shots are extreme close-ups of
        objects or details (a hand picking up a key, a clock face showing
        midnight, a message on a phone). Describe the object and the action
        clearly in the shot prompt. Insert shots are usually very short (2–4
        seconds).
      doc_file: docs/features/cinematography.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - Cinematography

  # -----------------------------------------------------------------------
  # COST OPTIMIZATION (NEW)
  # -----------------------------------------------------------------------

  - question: What is the cheapest way to previs a full feature before final rendering?
    question_info:
      category: Account & Billing
      tags: [cost optimization, previs, Wan, Hunyuan, budget]
    answer:
      description: >
        Use Wan 2.1 or Hunyuan at Draft quality for all previs shots — this
        costs 2–5 credits per shot versus 10–20 for Veo 3 high quality. Lock
        the previs pass and review the full film. Then selectively upgrade only
        key scenes to Veo 3 High quality. This reduces total credit spend by
        50–70% compared to rendering everything at final quality first.
      doc_file: docs/account/credits.mdx
      doc_updated: true
      click_path:
        - Home
        - Account & Billing
        - Credits

  - question: Do I get charged credits if a generation fails?
    question_info:
      category: Account & Billing
      tags: [failed generation, credits, refund, error]
    answer:
      description: >
        If a generation fails due to a platform or model error, credits are
        refunded automatically. If the generation completed successfully but
        you don't like the result, credits are consumed — you can regenerate
        with the same or adjusted prompt at the same credit cost. Content
        policy blocks before generation do not consume credits.
      doc_file: docs/account/credits.mdx
      doc_updated: true
      click_path:
        - Home
        - Account & Billing
        - Credits

  - question: How do I see the credit cost for a generation before committing?
    question_info:
      category: Account & Billing
      tags: [cost estimate, credit cost, before generate, button]
    answer:
      description: >
        Every Generate button shows the exact credit cost in brackets before
        you click it (e.g., "Generate [120 Credits]"). The quality selector
        shows multiple cost options side by side so you can choose the
        right trade-off for each shot. If you don't have enough credits,
        the button shows the shortfall.
      doc_file: docs/account/credits.mdx
      doc_updated: true
      click_path:
        - Home
        - Account & Billing
        - Credits

