  - question: Can I render multiple shots at the same time?
    question_info:
      category: Render Queue
      tags: [parallel render, batch, queue]
    answer:
      description: >
        Yes. Select multiple shots and click Generate All. ACT3 AI runs them
        in parallel up to the concurrency limit of your plan. Higher-tier plans
        allow more simultaneous generations.
      doc_file: docs/features/render-queue.mdx
      doc_updated: true
