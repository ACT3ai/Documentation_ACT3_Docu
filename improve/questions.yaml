  # -----------------------------------------------------------------------

  - question: How do I create my first project in ACT3 AI?
    question_info:
      category: Getting Started
      tags: [onboarding, project, new user]
    answer:
      description: >
        After signing in, click New Project on the dashboard. Enter a title
        and optional description, then click Create. ACT3 AI opens the project
        workspace where you can import or write your script.
      doc_file: docs/getting-started/first-project.mdx
      doc_updated: true
      click_path:
        - Home
        - Getting Started
        - Your First Project

  - question: How do I create an ACT3 AI account?
    question_info:
      category: Getting Started
      tags: [account, sign up, registration]
    answer:
      description: >
        Go to act3ai.com and click Get Started. Enter your email and choose a
        password, or sign up with Google. Confirm your email, then select a
        plan to activate your account.
      doc_file: docs/getting-started/create-account.mdx
      doc_updated: true
      click_path:
        - Home
        - Getting Started
        - Create Your Account

  - question: What is the ACT3 AI dashboard and what can I do from it?
    question_info:
      category: Getting Started
      tags: [dashboard, navigation, overview]
    answer:
      description: >
        The dashboard is your home base. It shows all your projects, recent
        activity, credit balance, and quick links to start a new project,
        browse templates, or access the asset library.
      doc_file: docs/getting-started/dashboard.mdx
      doc_updated: true
      click_path:
        - Home
        - Getting Started
        - The Dashboard

  - question: What is the core workflow for making a movie in ACT3 AI?
    question_info:
      category: Getting Started
      tags: [workflow, overview, pipeline]
    answer:
      description: >
        The workflow is: Script → Beats → Scenes → Shots → AI Video Generation
        → Edit → Export. You start with a script (imported or written in-app),
        break it into beats and scenes, define shots with camera and lighting
        settings, generate AI video for each shot, then assemble and export.
      doc_file: docs/getting-started/introduction.mdx
      doc_updated: true
      click_path:
        - Home
        - Getting Started
        - Introduction

  # -----------------------------------------------------------------------
  # CORE CONCEPTS
  # -----------------------------------------------------------------------

  - question: What is a Beat in ACT3 AI?
    question_info:
      category: Core Concepts
      tags: [beat, story, structure]
    answer:
      description: >
        A Beat is the smallest unit of action or emotion in your script — a
        single moment that moves the story forward. Beats are the building
        blocks underneath scenes. Breaking your script into beats helps ACT3 AI
        understand pacing and generate the right video for each moment.
      doc_file: docs/concepts/beats.mdx
      doc_updated: true
      click_path:
        - Home
        - Core Concepts
        - Beats

  - question: What is a Scene and how is it different from a Shot?
    question_info:
      category: Core Concepts
      tags: [scene, shot, structure, concepts]
    answer:
      description: >
        A Scene is a continuous story unit set at one location and time — it
        contains multiple shots. A Shot is a single camera angle and movement
        within that scene. ACT3 AI generates one video clip per shot, then
        assembles them into scenes.
      doc_file: docs/concepts/scenes.mdx
      doc_updated: true
      click_path:
        - Home
        - Core Concepts
        - Scenes

  - question: What is a Shot in ACT3 AI?
    question_info:
      category: Core Concepts
      tags: [shot, camera, generation, concepts]
    answer:
      description: >
        A Shot defines a single camera angle, movement, and duration within a
        scene. Each shot becomes one AI-generated video clip. You set the
        framing, camera motion, lighting, characters, and a shot prompt to
        guide the generation.
      doc_file: docs/concepts/shots.mdx
      doc_updated: true
      click_path:
        - Home
        - Core Concepts
        - Shots

  - question: What is an Act and how does it organize my movie?
    question_info:
      category: Core Concepts
      tags: [act, story structure, three-act]
    answer:
      description: >
        An Act is a major story division — most movies use three acts (setup,
        confrontation, resolution). In ACT3 AI, acts group your scenes at the
        highest level, helping you see the big-picture structure and pace of
        your film.
      doc_file: docs/concepts/acts.mdx
      doc_updated: true
      click_path:
        - Home
        - Core Concepts
        - Acts

  - question: How are Acts, Scenes, Shots, and Beats related to each other?
    question_info:
      category: Core Concepts
      tags: [hierarchy, structure, concepts]
    answer:
      description: >
        They form a hierarchy: Acts contain Scenes, Scenes contain Shots, and
        Shots map to Beats. An act is the broadest division; a beat is the
        smallest moment. Every beat you write eventually becomes one or more
        shots that ACT3 AI generates as video.
      doc_file: docs/concepts/overview.mdx
      doc_updated: true
      click_path:
        - Home
        - Core Concepts
        - Story Structure Overview

  - question: What is story structure and how does ACT3 AI support it?
    question_info:
      category: Core Concepts
      tags: [story structure, three-act, narrative]
    answer:
      description: >
        Story structure is the organization of your narrative into acts and
        story arcs. ACT3 AI provides an outliner where you define acts, write
        beat descriptions, and map the emotional arc across your whole film
        before generating any video.
      doc_file: docs/concepts/overview.mdx
      doc_updated: true
      click_path:
        - Home
        - Core Concepts
        - Story Structure Overview

  # -----------------------------------------------------------------------
  # SCRIPT & WRITING
  # -----------------------------------------------------------------------

