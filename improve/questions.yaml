  - question: Can I cancel and restart my subscription without losing my projects?
    question_info:
      category: Account & Billing
      tags: [cancel, restart, projects, data retention]
    answer:
      description: >
        Yes. When you cancel, your account downgrades to the free tier and your
        projects remain accessible for 90 days. If you resubscribe within that
        window, everything is still there. After 90 days, projects may be
        archived. Resubscribing after archival restores all project data.
      doc_file: docs/account/account-cancellation.mdx
      doc_updated: true
      click_path:
        - Home
        - Account & Billing
        - Account Cancellation
