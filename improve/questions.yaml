  - question: How do I recover a project I accidentally deleted?
    question_info:
      category: Troubleshooting
      tags: [deleted project, recover, restore, trash]
    answer:
      description: >
        Deleted projects go to the Trash folder (Account → Projects → Trash)
        and are retained for 30 days before permanent deletion. Open the Trash,
        find your project, and click Restore. After 30 days the project is
        permanently deleted and cannot be recovered.
      doc_file: docs/faq/general.mdx
      doc_updated: true
      click_path:
        - Home
        - FAQ
        - General FAQ

  - question: Why does my character look different between shots even with the same actor?
    question_info:
      category: Troubleshooting
      tags: [character inconsistency, actor reference, generation, consistency]
    answer:
      description: >
        Character appearance drift happens when the reference image is low
        resolution, the shot prompt overrides the character description, or
        the lighting/style preset is creating very different shadows. Update
        the actor with a higher-quality reference image, ensure the prompt
        doesn't contradict the actor definition, and check that the style
        preset is not drastically altering the look.
      doc_file: docs/features/actors.mdx
      doc_updated: true
      click_path:
        - Home
        - Features
        - Actors

